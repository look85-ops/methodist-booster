<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <!-- тело - округлое, грузное -->
  <path d="M 120 250 
           C 100 300, 80 380, 100 450 
           C 120 500, 200 520, 280 510 
           C 350 500, 400 480, 420 420 
           C 440 360, 430 280, 380 240 
           C 350 210, 280 200, 220 210 
           C 170 220, 140 230, 120 250 Z" 
        fill="#5B8A5B" />
  
  <!-- голова (приставлена сверху) -->
  <path d="M 170 220 
           C 150 180, 140 120, 170 90 
           C 200 60, 260 60, 290 80 
           C 320 100, 320 150, 300 190 
           C 280 220, 230 230, 200 225 
           C 180 220, 175 220, 170 220 Z" 
        fill="#5B8A5B" />
  
  <!-- глаза -->
  <circle cx="210" cy="120" r="6" fill="#F5F0E8" />
  <circle cx="260" cy="120" r="6" fill="#F5F0E8" />
  
  <!-- зрачки (смещены вбок - глуповатый взгляд) -->
  <circle cx="207" cy="120" r="3" fill="#1A1A1A" />
  <circle cx="257" cy="120" r="3" fill="#1A1A1A" />
  
  <!-- нос -->
  <circle cx="235" cy="145" r="5" fill="#3D6B3D" />
  
  <!-- рот -->
  <path d="M 215 160 C 225 170, 245 170, 255 160" fill="none" stroke="#3D6B3D" stroke-width="3" stroke-linecap="round" />
  
  <!-- ухо левое (ветка!) -->
  <path d="M 170 100 C 140 70, 110 60, 100 90 C 90 120, 120 140, 150 130 C 170 120, 170 110, 170 100 Z" 
        fill="#5B8A5B" />
  
  <!-- ухо правое -->
  <path d="M 290 90 C 320 60, 350 70, 350 100 C 350 130, 320 140, 300 120 Z" fill="#5B8A5B" />
  
  <!-- короткая нога передняя -->
  <path d="M 160 500 C 140 540, 130 570, 140 580 C 150 590, 180 590, 190 580 C 200 570, 190 540, 180 500 Z" fill="#5B8A5B" />
  
  <!-- короткая нога задняя -->
  <path d="M 320 500 C 300 540, 290 570, 300 580 C 310 590, 340 590, 350 580 C 360 570, 350 540, 340 500 Z" fill="#5B8A5B" />
  
  <!-- хвост (торчком) -->
  <path d="M 400 420 C 440 400, 460 370, 450 340 C 440 310, 420 320, 410 350 C 400 380, 410 410, 400 420 Z" fill="#5B8A5B" />
</svg>
