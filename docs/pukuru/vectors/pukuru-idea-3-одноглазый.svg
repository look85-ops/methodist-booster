<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- существо без головы — всё тело одна форма с одним глазом -->
  <path d="M 160 80 L 140 50 L 180 40 L 220 45 L 260 60 L 280 100 L 270 150 L 260 190 L 290 240 
           L 320 290 L 330 340 L 310 380 L 280 410 L 240 430 L 200 440 L 160 430 L 120 410 
           L 90 380 L 70 340 L 80 290 L 110 240 L 130 190 L 120 150 L 110 100 Z" 
        fill="#3A5A4A" />
  <!-- единственный глаз -->
  <circle cx="200" cy="180" r="8" fill="#E8DCC8" />
  <circle cx="200" cy="180" r="3" fill="#1A1A1A" />
  <!-- что-то держит (палка/инструмент) -->
  <line x1="120" y1="300" x2="340" y2="200" stroke="#3A5A4A" stroke-width="6" stroke-linecap="round" />
  <!-- вторая рука потоньше -->
  <path d="M 280 280 L 320 340 L 340 360 Z" fill="#3A5A4A" />
  <!-- ноги (одна короче, прихрамывает) -->
  <path d="M 160 440 L 140 490 L 160 500 Z" fill="#3A5A4A" />
  <path d="M 240 430 L 270 480 L 290 490 Z" fill="#3A5A4A" />
</svg>
