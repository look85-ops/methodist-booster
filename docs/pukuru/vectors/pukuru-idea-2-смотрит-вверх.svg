<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 500" width="350" height="500">
  <!-- кто-то сидит на корточках и смотрит вверх -->
  <path d="M 140 60 L 160 40 L 200 45 L 210 80 L 200 120 L 180 140 L 160 130 L 140 110 L 130 80 Z" fill="#5A6B4A" />
  <!-- тело (согнутое) -->
  <path d="M 120 140 L 220 150 L 230 220 L 240 290 L 250 340 L 220 380 L 180 390 L 140 380 L 100 340 L 90 280 L 100 220 Z" fill="#5A6B4A" />
  <!-- руки вверх (тянется к чему-то) -->
  <path d="M 120 200 L 60 140 L 50 100 Z" fill="#5A6B4A" />
  <path d="M 240 200 L 300 130 L 320 90 Z" fill="#5A6B4A" />
  <!-- ноги (поджаты) -->
  <path d="M 140 380 L 110 450 L 130 470 Z" fill="#5A6B4A" />
  <path d="M 200 380 L 230 450 L 250 470 Z" fill="#5A6B4A" />
  <!-- глаза смотрят вверх -->
  <circle cx="160" cy="80" r="4" fill="#E8DCC8" />
  <circle cx="190" cy="80" r="4" fill="#E8DCC8" />
  <circle cx="162" cy="78" r="2" fill="#1A1A1A" />
  <circle cx="192" cy="78" r="2" fill="#1A1A1A" />
  <!-- рот (удивлённый) -->
  <ellipse cx="175" cy="100" rx="6" ry="4" fill="#3D4A3A" />
</svg>
