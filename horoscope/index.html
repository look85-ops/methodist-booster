body {

  justify-content: center;
  padding: 20px;
  color: #f0eae0;
}
.container {
  max-width: 720px;
  width: 100%;
  position: relative;
}
.stars {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.2); }
}
header {
  text-align: center;
  margin-bottom: 32px;
  position: relative;
  z-index: 1;
}
.badge {
  display: inline-block;
  background: rgba(240, 165, 0, 0.15);
  border: 1px solid rgba(240, 165, 0, 0.3);
  color: #f0a500;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 16px;
}
h1 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 48px;
  font-weight: 400;
  color: #fff;
  letter-spacing: -1px;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(240,165,0,0.15);
}
.subtitle {
  font-size: 14px;
  color: rgba(240, 234, 224, 0.5);
  font-style: italic;
  margin-bottom: 16px;
}
.meta {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 13px;
  color: rgba(240, 234, 224, 0.6);
}
.meta span { display: flex; align-items: center; gap: 6px; }
.card {
  position: relative;
  z-index: 1;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  padding: 40px;
  margin-bottom: 20px;
  transition: opacity 0.6s ease;
}
.card.loading {
  opacity: 0;
}
.card.visible {
  opacity: 1;
}
.horoscope-text {
  font-size: 18px;
  line-height: 1.7;
  color: rgba(240, 234, 224, 0.9);
}
.horoscope-text p { margin-bottom: 16px; }
.horoscope-text p:last-child { margin-bottom: 0; }
.horoscope-text .intro {
  font-size: 20px;
  font-weight: 600;
  color: #f0a500;
  font-family: Georgia, serif;
}
.horoscope-text .highlight {
  background: linear-gradient(120deg, rgba(240,165,0,0.15) 0%, rgba(240,165,0,0.05) 100%);

  border-radius: 4px;
}
.sign-day {

  z-index: 1;

  align-items: center;
  gap: 16px;

  border-radius: 16px;
  padding: 20px 24px;

.sign-info strong {
  color: #f0a500;

  gap: 12px;
  margin-bottom: 20px;

.extra-item {

  font-weight: 600;
  color: #f0eae0;

  color: #f0a500;

  color: #fff;
  margin-bottom: 8px;

  padding-top: 12px;

  font-size: 12px;
  color: rgba(240, 234, 224, 0.3);
  line-height: 1.6;

  z-index: 1;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 16px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(240, 234, 224, 0.6);
  padding: 10px 24px;

  border-color: rgba(240, 165, 0, 0.3);
  color: #f0a500;

  h1 { font-size: 32px; }
  .card { padding: 24px; }
  .horoscope-text { font-size: 16px; }
  .horoscope-text .intro { font-size: 18px; }

  .meta { flex-direction: column; gap: 4px; }

    "сегодня ты в центре внимания — и это твой день. Сияй.",
    "сегодня порядок в делах принесёт порядок в голове. Структурируй.",
    "сегодня твоё чувство баланса спасёт ситуацию. Ты — дипломат дня.",
    "сегодня твоя страсть к деталям пригодится. Никто не заметит, а ты заметишь.",
    "сегодня твой оптимизм заразителен. Делись им — это социально ответственно.",
    "сегодня твоя дисциплина — твоя суперсила. План выполнится.",
    "сегодня твоя креативность бьёт ключом. Предложи нестандартное решение.",
    "сегодня твоя эмпатия нужна команде. Услышь тех, кто молчит."
  ];

  // ---- rendering ----
  const isPreview = isBefore7;
  const dayNames = ["воскресенье", "понедельник", "вторник", "среда", "четверг", "пятница", "суббота"];
  const monthNames = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];

  document.getElementById('dateDisplay').innerHTML =
    `<span>📅 ${displayDate.getDate()} ${monthNames[displayDate.getMonth()]}, ${dayNames[displayDate.getDay()]}</span>`;

  if (isPreview) {
    document.getElementById('updateTime').innerHTML =
      `<span>⏰ Сегодняшний гороскоп выйдет в 07:00</span>`;
    document.getElementById('mainCard').classList.remove('loading');
    document.getElementById('mainCard').classList.add('visible');
    document.getElementById('horoscopeText').innerHTML = `
      <div class="before-7am">
        <div class="emoji-big">🌙</div>
        <h2>Гороскоп ещё готовится</h2>
        <p>Звёзды ещё не проснулись. Загляни после 07:00 — будет горячий гороскоп прямо из типографии.</p>
        <p style="margin-top:12px;font-size:13px">А пока — вот тебе вчерашний, чтобы точно знать, что день был хорошим:</p>
      </div>
    `;
    document.getElementById('signDay').style.display = 'none';
    document.getElementById('extraGrid').style.display = 'none';
  }

  // main horoscope
  const intro = pick(intros, rand);
  const body = pick(bodies, rand);
  const twist = pick(twists, rand);
  const advice = pick(advices, rand);
  const bonus = pick(bonuses, rand);

  const horoHTML = `
    <p><span class="intro">${intro}</span></p>
    <p>${body}</p>
    <p><span class="highlight">✨ ${twist}</span></p>
    <p><span class="highlight">💡 ${advice}</span></p>
    <p style="font-style:italic;color:rgba(240,234,224,0.5);font-size:15px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;margin-top:16px">${bonus}</p>
  `;

  if (!isPreview) {
    document.getElementById('updateTime').innerHTML = `<span>☀️ Обновлено сегодня в 07:00</span>`;
    document.getElementById('horoscopeText').innerHTML = horoHTML;
    document.getElementById('mainCard').classList.remove('loading');
    document.getElementById('mainCard').classList.add('visible');

    // sign of the day
    const signIdx = Math.floor(rand() * zodiacSigns.length);
    const sign = zodiacSigns[signIdx];
    const signDesc = signDescriptions[signIdx];
    document.getElementById('signIcon').textContent = sign.emoji;
    document.getElementById('signText').innerHTML =
      `<strong>${sign.name}</strong> (${sign.dates}): ${signDesc}`;
    document.getElementById('signDay').style.display = 'flex';

    // extra grid
    document.getElementById('moodValue').textContent = pick(moods, rand);
    document.getElementById('numberValue').textContent = pick(numbers, rand);
    document.getElementById('coffeeValue').textContent = pick(coffees, rand);
    document.getElementById('extraGrid').style.display = 'grid';
  }

  // ---- share ----
  document.getElementById('shareBtn').addEventListener('click', function() {
    const text = isPreview
      ? `🌙 Гороскоп дня ещё готовится (выйдет в 07:00). Загляни на horoscope!`
      : `☀️ Утренний гороскоп на ${displayDate.getDate()} ${monthNames[displayDate.getMonth()]}:\n«${body}»\n${advice}`;
    if (navigator.share) {
      navigator.share({ title: 'Утренний гороскоп', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('shareBtn');
        btn.textContent = 'Скопировано!';
        setTimeout(() => { btn.textContent = 'Поделиться с коллегами'; }, 2000);
      }).catch(() => {});
    }
  });

  // ---- stars ----
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--d', (2 + Math.random() * 3) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    starsEl.appendChild(star);
  }
})();
</script>
</body>
</html>
