<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Утренний гороскоп — зарядись на день!</title>
<style>
*, *:before, *:after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 40%, #24243e 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: #f0eae0;
}
.container { max-width: 820px; width: 100%; position: relative; }
.stars {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; overflow: hidden; z-index: 0;
}
.star {
  position: absolute; width: 2px; height: 2px;
  background: #fff; border-radius: 50%;
  animation: twinkle var(--d) ease-in-out infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.2; transform: scale(0.8); }
  100% { opacity: 1; transform: scale(1.2); }
}
header {
  text-align: center; margin-bottom: 28px; position: relative; z-index: 1;
}
.badge {
  display: inline-block;
  background: rgba(240, 165, 0, 0.15);
  border: 1px solid rgba(240, 165, 0, 0.3);
  color: #f0a500; padding: 4px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 14px;
}
h1 {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 44px; font-weight: 400; color: #fff;
  letter-spacing: -1px; margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(240,165,0,0.15);
}
.meta {
  display: flex; justify-content: center; gap: 20px;
  font-size: 13px; color: rgba(240, 234, 224, 0.6);
}
.meta span { display: flex; align-items: center; gap: 6px; }
.intro-card {
  position: relative; z-index: 1;
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 18px; padding: 28px; margin-bottom: 24px;
  text-align: center;
  transition: opacity 0.6s ease;
}
.intro-card.loading { opacity: 0; }
.intro-card.visible { opacity: 1; }
.intro-text {
  font-family: Georgia, serif; font-size: 20px; line-height: 1.6;
  color: rgba(240, 234, 224, 0.9);
}
.intro-text .accent { color: #f0a500; }
.signs-grid {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.sign-card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 14px; padding: 16px;
  transition: all 0.2s ease;
}
.sign-card:hover {
  background: rgba(255, 255, 255, 0.07);
  border-color: rgba(240, 165, 0, 0.2);
}
.sign-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.sign-emoji { font-size: 26px; line-height: 1; }
.sign-name {
  font-weight: 700; font-size: 15px; color: #f0a500;
}
.sign-dates {
  font-size: 11px; color: rgba(240, 234, 224, 0.35); margin-left: auto;
}
.sign-prediction {
  font-size: 14px; line-height: 1.5;
  color: rgba(240, 234, 224, 0.8);
}
.sign-prediction p { margin-bottom: 6px; }
.sign-prediction p:last-child { margin-bottom: 0; }
.sign-meta {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  display: flex; gap: 12px; font-size: 12px; color: rgba(240, 234, 224, 0.4);
}
.before-7am {
  text-align: center; padding: 20px;
}
.before-7am .emoji-big { font-size: 56px; margin-bottom: 16px; }
.before-7am h2 {
  font-family: Georgia, serif; font-size: 24px; color: #fff; margin-bottom: 8px;
}
.before-7am p { color: rgba(240, 234, 224, 0.6); font-size: 15px; }
footer {
  position: relative; z-index: 1; text-align: center; padding-top: 8px;
}
footer p {
  font-size: 12px; color: rgba(240, 234, 224, 0.3); line-height: 1.6;
}
.share-btn {
  position: relative; z-index: 1;
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 16px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: rgba(240, 234, 224, 0.6);
  padding: 10px 24px; border-radius: 30px;
  font-size: 14px; cursor: pointer;
  transition: all 0.2s ease; font-family: inherit;
}
.share-btn:hover {
  background: rgba(240, 165, 0, 0.15);
  border-color: rgba(240, 165, 0, 0.3);
  color: #f0a500;
}
@media (max-width: 640px) {
  h1 { font-size: 30px; }
  .signs-grid { grid-template-columns: 1fr; }
  .meta { flex-direction: column; gap: 4px; }
  .intro-card { padding: 20px; }
  .intro-text { font-size: 17px; }
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header>
    <div class="badge">☕ Утренний ритуал</div>
    <h1>Гороскоп дня</h1>
    <div class="meta">
      <span id="dateDisplay"></span>
      <span id="updateTime"></span>
    </div>
  </header>

  <div class="intro-card loading" id="introCard">
    <div class="intro-text" id="introText"></div>
  </div>

  <div class="signs-grid" id="signsGrid"></div>

  <div style="text-align:center;position:relative;z-index:1">
    <button class="share-btn" id="shareBtn">Поделиться с коллегами</button>
  </div>

  <footer>
    <p>* Гороскоп не является официальным документом<br>и не может быть использован в суде</p>
    <p style="margin-top:4px">Сделано с зарядом на весь день</p>
  </footer>
</div>

<script>
(function() {
  function hashDate(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; }
    return Math.abs(h) || 1;
  }
  function rng(seed) {
    let s = seed;
    return function() { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  }
  function pick(arr, r) { return arr[Math.floor(r() * arr.length)]; }
  function shuffle(arr, r) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(r() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const now = new Date();
  const h = now.getHours();
  const isBefore7 = h < 7;
  const displayDate = isBefore7 ? new Date(now.getTime() - 86400000) : now;
  const seedDate = displayDate.toISOString().slice(0, 10);
  const daySeed = hashDate(seedDate);
  const rand = rng(daySeed);

  // ---- general content ----
  const vibes = [
    "Всё будет хорошо. <span class=accent>Серьёзно.</span> Даже лучше, чем ты планируешь.",
    "Сегодня планеты в хорошем настроении. И твой внутренний бариста — тоже.",
    "День обещает быть тёплым. Даже если на улице дождь — внутри будет солнце.",
    "Звёзды говорят: сегодня можно чуть больше обычного. Чуть больше улыбок, чуть меньше дедлайнов.",
    "Сегодняшний девиз: спокойствие, только спокойствие и ещё один коммит.",
    "Вселенная прислала уведомление: сегодня — день лёгких побед и вкусных обедов.",
    "Если бы у дня был заголовок, он звучал бы как «Всё получится».",
    "Сегодня твой личный GPS настроен на режим «без пробок». Вперёд.",
    "Энергия дня — чистое спокойствие. Даже если дедлайн горит — ты горишь красиво.",
    "Сегодня ты — главный герой. Не второстепенный, а тот, кого показывают в трейлере."
  ];

  // ---- per-sign content pools (picked per sign using offset seed) ----
  const signBodies = [
    "проснёшься с ощущением, что сегодня успеешь больше, чем вчера. Даже если успеешь только сделать кофе — уже победа.",
    "коммуникации будут лёгкими. Даже тот коллега, который пишет «как там с задачей?», сегодня спросит «как ты вообще?».",
    "энергия располагает к подвигам. Например, разобрать папку «Разобрать» на рабочем столе.",
    "день располагает к экспериментам. Попробуй новый маршрут или новый вид бутерброда.",
    "вероятны приятные мелочи. Кто-то угостит печеньем или внезапно починят кулер.",
    "продуктивность будет на высоте, если начать с самой неприятной задачи. Съешь лягушку утром.",
    "креативность зашкаливает. Если придумаешь гениальную идею — запиши, к обеду забудешь.",
    "звёзды советуют не планировать слишком много. Оставь место для спонтанных встреч и вкусняшек.",
    "отличный день, чтобы закончить старые дела. Или подвинуть их в статусе «в процессе».",
    "настройка простая: делать то, что нравится. Ну, хотя бы попытаться.",
    "ты в центре внимания, но без лишнего шума. Как хороший код — работает, и никто не замечает.",
    "день обещает сюрпризы. Возможно, ты узнаешь, что в любимом приложении есть тёмная тема.",
    "твой внутренний перфекционист берёт выходной. И это нормально.",
    "звёзды говорят: делай только то, что сделает твой день лучше. Остальное — завтра.",
    "сегодняшний день похож на хорошо написанный код: без багов и с понятными комментариями.",
    "сегодня ты — энергия в чистом виде. Начинай важные дела до обеда.",
    "дипломатия — твой конёк. Даже если хочешь ответить резко, сделай паузу и ответь остроумно.",
    "всё, что запланировал, получится. Ну, или почти всё. 80% — это тоже отлично.",
    "сегодня доверяй интуиции. Она работает громче, чем утренний будильник.",
    "твой оптимизм заразителен. Делись им — это социально ответственно."
  ];

  const signTwists = [
    "Но есть нюанс: кто-то принесёт домашнюю выпечку, и план «не есть сладкое» провалится.",
    "В 14:32 случится нечто, что заставит улыбнуться. Возможно, мем в чате.",
    "После обеда поймаешь себя на мысли, что день пролетел незаметно. Хороший знак.",
    "Коллега скажет неожиданно мудрую вещь. Запиши — пригодится.",
    "Начав мелкую задачу, не заметишь, как сделаешь половину большого проекта.",
    "Спойлер: в конце дня почувствуешь удовлетворение. Даже если сделал не всё.",
    "Риск: тебе предложат чай именно в момент, когда только нальёшь кофе.",
    "Ближе к вечеру откроется второе дыхание. Или третье.",
    "Велика вероятность случайно сделать комплимент и сделать чей-то день.",
    "Именно сегодня может прийти ответ на вопрос, заданный месяц назад."
  ];

  const signAdvices = [
    "Совет: начни с малого — открой глаза, улыбнись, вдохни.",
    "Если что-то идёт не так — закрой ноутбук, открой окно, выдохни.",
    "Напиши себе «Ты молодец!» и перечитывай в течение дня.",
    "Сделай одно дело, которое откладывал месяц. Облегчение — бесплатно.",
    "Раздели день на блоки по 45 минут. Между ними — 5 минут просто так.",
    "Если устал — отдохни. Если не устал — отдохни профилактически.",
    "Не сравнивай себя с другими. Сравнивай себя вчерашнего с собой сегодняшним.",
    "Если не знаешь, что делать — сделай чай. С чаем думается лучше.",
    "Прежде чем нажать «отправить», перечитай. Или не перечитывай.",
    "Попроси то, что давно хотел. Максимум — откажут. Минимум — магия.",
    "Ты справлялся раньше. Справишься и сейчас.",
    "Сделай сегодня что-то, что порадует завтрашнего тебя."
  ];

  const signsData = [
    { name: "Овен", dates: "21 мар — 19 апр", emoji: "♈" },
    { name: "Телец", dates: "20 апр — 20 май", emoji: "♉" },
    { name: "Близнецы", dates: "21 май — 20 июн", emoji: "♊" },
    { name: "Рак", dates: "21 июн — 22 июл", emoji: "♋" },
    { name: "Лев", dates: "23 июл — 22 авг", emoji: "♌" },
    { name: "Дева", dates: "23 авг — 22 сен", emoji: "♍" },
    { name: "Весы", dates: "23 сен — 22 окт", emoji: "♎" },
    { name: "Скорпион", dates: "23 окт — 21 ноя", emoji: "♏" },
    { name: "Стрелец", dates: "22 ноя — 21 дек", emoji: "♐" },
    { name: "Козерог", dates: "22 дек — 19 янв", emoji: "♑" },
    { name: "Водолей", dates: "20 янв — 18 фев", emoji: "♒" },
    { name: "Рыбы", dates: "19 фев — 20 мар", emoji: "♓" }
  ];

  const moods = [
    "Бодрый как эспрессо", "Спокойный как воскресенье",
    "Деловой как план", "Вдохновлённый как после кино",
    "Уверенный как код без ошибок", "Расслабленный как пятница",
    "Сосредоточенный как перед дедлайном", "Весёлый как переписка с другом",
    "Философский как после умной статьи", "Энергичный как любимый плейлист"
  ];

  const numbers = [
    "42", "404", "200", "7", "13", "100", "0", "3.14", "256", "1024",
    "88", "∞", "123", "007", "99", "50", "365", "24/7", "10x", "8"
  ];

  // ---- helpers per sign ----
  function signPrediction(signIdx) {
    const s = hashDate(seedDate + signIdx);
    const r = rng(s);
    const body = pick(signBodies, r);
    const twist = pick(signTwists, r);
    const advice = pick(signAdvices, r);
    const mood = pick(moods, r);
    const num = pick(numbers, r);
    return { body, twist, advice, mood, num };
  }

  // ---- rendering ----
  const dayNames = ["воскресенье", "понедельник", "вторник", "среда", "четверг", "пятница", "суббота"];
  const monthNames = ["января", "февраля", "марта", "апреля", "мая", "июня", "июля", "августа", "сентября", "октября", "ноября", "декабря"];

  document.getElementById('dateDisplay').innerHTML =
    `<span>📅 ${displayDate.getDate()} ${monthNames[displayDate.getMonth()]}, ${dayNames[displayDate.getDay()]}</span>`;

  if (isBefore7) {
    document.getElementById('updateTime').innerHTML =
      `<span>⏰ Сегодняшний гороскоп выйдет в 07:00</span>`;
    document.getElementById('introCard').classList.remove('loading');
    document.getElementById('introCard').classList.add('visible');
    document.getElementById('introText').innerHTML = `
      <div class="before-7am">
        <div class="emoji-big">🌙</div>
        <h2>Гороскоп ещё готовится</h2>
        <p>Звёзды ещё не проснулись. Загляни после 07:00.</p>
        <p style="margin-top:12px;font-size:13px">А пока — держи вчерашний, чтобы точно знать, что день был хорошим:</p>
      </div>
    `;
    document.getElementById('signsGrid').innerHTML = '';
  }

  const vibe = pick(vibes, rand);

  if (!isBefore7) {
    document.getElementById('updateTime').innerHTML = `<span>☀️ Обновлено сегодня в 07:00</span>`;
    document.getElementById('introCard').classList.remove('loading');
    document.getElementById('introCard').classList.add('visible');
    document.getElementById('introText').innerHTML = `<p>${vibe}</p>`;

    let html = '';
    for (let i = 0; i < signsData.length; i++) {
      const s = signsData[i];
      const p = signPrediction(i);
      html += `
        <div class="sign-card">
          <div class="sign-header">
            <span class="sign-emoji">${s.emoji}</span>
            <span class="sign-name">${s.name}</span>
            <span class="sign-dates">${s.dates}</span>
          </div>
          <div class="sign-prediction">
            <p>${s.name} сегодня ${p.body}</p>
            <p>✨ ${p.twist}</p>
            <p>💡 ${p.advice}</p>
          </div>
          <div class="sign-meta">
            <span>🎯 ${p.mood}</span>
            <span>🔢 ${p.num}</span>
          </div>
        </div>
      `;
    }
    document.getElementById('signsGrid').innerHTML = html;
  }

  // ---- share ----
  document.getElementById('shareBtn').addEventListener('click', function() {
    const first = isBefore7 ? '' : signsData.map((s, i) => {
      const p = signPrediction(i);
      return `${s.emoji} ${s.name}: ${p.body} ${p.advice}`;
    }).slice(0, 3).join('\n');
    const text = isBefore7
      ? `🌙 Гороскоп дня ещё готовится (выйдет в 07:00)`
      : `☀️ Утренний гороскоп на ${displayDate.getDate()} ${monthNames[displayDate.getMonth()]}:\n${first}\n\nОстальные знаки — по ссылке!`;
    if (navigator.share) {
      navigator.share({ title: 'Утренний гороскоп', text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('shareBtn');
        btn.textContent = 'Скопировано!';
        setTimeout(() => { btn.textContent = 'Поделиться с коллегами'; }, 2000);
      }).catch(() => {});
    }
  });

  // ---- stars ----
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--d', (2 + Math.random() * 3) + 's');
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
    starsEl.appendChild(star);
  }
})();
</script>
</body>
</html>
